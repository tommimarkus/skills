interface:
  display_name: "Architecture Design"
  short_description: >-
    Use when building, extracting, reviewing, rendering, validating, repairing,
    or looking up enterprise, solution, or application architecture models in
    ArchiMate® 3.2 OEF XML, including runtime layout contract checks, layout
    policy diagnostics, machine-readable layout warning evidence, route repair,
    global polish, layout-result to OEF materialization, per-view layout
    provenance output, rendered PNG validation, change classification,
    professional-readiness review of OEF views, architecture drift checks, and
    reverse lookup from code, UI, API, or workflow artifacts to owning Business
    Processes.
  default_prompt: "Review this architecture model for professional readiness."
policy:
  allow_implicit_invocation: true
