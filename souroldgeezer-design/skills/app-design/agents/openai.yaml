interface:
  display_name: App Design
  short_description: >-
    Use when building, extracting, reviewing, or looking up frontend app design:
    routes/screens, components, state/data flow, rendering, forms, navigation,
    browser behavior, responsive/a11y/i18n/performance, and Blazor™ WebAssembly.
    Defer software, API, infra, architecture, security, and test-quality work.
  default_prompt: "Review this frontend app design against the app-design reference."
policy:
  allow_implicit_invocation: true
