interface:
  display_name: "Software Design"
  short_description: >-
    Use when building, extracting, reviewing, or looking up
    code/module/service/refactor design: boundaries, dependencies,
    responsibilities, semantics, coupling, evolution, and .NET™, shell, or
    Python® tooling. Defer app/UI, API, infra, architecture, security, and
    test-quality work.
  default_prompt: "Use $software-design to review this code or shell script for sustainable design."
policy:
  allow_implicit_invocation: true
