interface:
  display_name: "PR Ops"
  short_description: >-
    Use when the user explicitly asks to create, review, update, fix, merge,
    close, resume, or process one or more pull requests, merge requests, or
    prepared PR/MR branches end to end; loads provider extensions such as GitHub™
    or GitLab™ only after the provider is identified.
  default_prompt: "Use pr-ops to create or handle this pull-request or merge-request lifecycle."
policy:
  allow_implicit_invocation: true
