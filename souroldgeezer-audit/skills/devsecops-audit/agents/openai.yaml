interface:
  display_name: "DevSecOps Audit"
  short_description: >-
    Use when auditing DevSecOps security posture for CI/CD workflows, IaC,
    containers, releases, or code-level security smells. Supports quick PR/file
    audits and deep repo reviews. Defer non-security design to sibling software,
    infra, API, app, architecture, and test-quality skills.
  default_prompt: "Audit this repository's DevSecOps posture."
policy:
  allow_implicit_invocation: true
