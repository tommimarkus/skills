interface:
  display_name: "DevSecOps Audit"
  short_description: >-
    Use when auditing DevSecOps posture for CI/CD, IaC, containers, releases,
    supply-chain evidence, or code-level security smells. Supports quick PR/file
    audits and deep repo reviews. Defer non-security design and test-quality
    work to sibling skills.
  default_prompt: "Audit this repository's DevSecOps posture."
policy:
  allow_implicit_invocation: true
